  encrypt: ^5.0.3
  equatable: ^2.0.3
  ffi: ^2.0.0
  filepicker_windows: ^2.1.4
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_colorpicker: ^1.1.0
  flutter_markdown: ^0.7.3
  flutter_svg: ^2.2.4
  foldable_list: ^1.0.1
  google_fonts: ^8.0.2
  http: ^1.2.1
  image: ^4.0.15
  intl: ^0.20.2
  just_audio: ^0.10.5
